name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | cut -d '"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check_tag.outputs.exists == 'false'
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check_tag.outputs.exists == 'false'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        if: steps.check_tag.outputs.exists == 'false'
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Build universal macOS bundle
        if: steps.check_tag.outputs.exists == 'false'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Write updater manifest
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          TARBALL=$(ls "$BUNDLE_DIR"/*.app.tar.gz)
          SIGNATURE=$(cat "$BUNDLE_DIR"/*.app.tar.gz.sig)
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/$(basename "$TARBALL")"
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg url "$URL" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $url, signature: $signature },
                "darwin-x86_64": { url: $url, signature: $signature }
              }
            }' > latest.json
          cat latest.json

      - name: Publish release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "plugout v${{ steps.version.outputs.version }}"
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            latest.json
          generate_release_notes: true
