name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | cut -d '"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check_tag.outputs.exists == 'false'
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check_tag.outputs.exists == 'false'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        if: steps.check_tag.outputs.exists == 'false'
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Build universal macOS bundle
        if: steps.check_tag.outputs.exists == 'false'
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Publish release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "plugout v${{ steps.version.outputs.version }}"
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          generate_release_notes: true
