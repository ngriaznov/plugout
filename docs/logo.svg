<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- plugout mark: an O sliced through by one line, the halves slid apart -->
  <defs>
    <clipPath id="above-cut">
      <rect x="-100" y="-172" width="456" height="286" transform="rotate(-45 128 128)"/>
    </clipPath>
    <clipPath id="below-cut">
      <rect x="-100" y="142" width="456" height="286" transform="rotate(-45 128 128)"/>
    </clipPath>
  </defs>
  <rect width="256" height="256" rx="58" fill="#141414"/>
  <g clip-path="url(#above-cut)">
    <circle cx="135" cy="121" r="52" stroke="#f0eeea" stroke-width="28"/>
  </g>
  <g clip-path="url(#below-cut)">
    <circle cx="121" cy="135" r="52" stroke="#f0eeea" stroke-width="28"/>
  </g>
  <line x1="54" y1="202" x2="202" y2="54" stroke="#a99bfa" stroke-width="14" stroke-linecap="round"/>
</svg>
